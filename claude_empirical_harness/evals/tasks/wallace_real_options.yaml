name: wallace_real_options
description: >
  Real-options replication of homeowner renovation timing using AHS national
  PUF waves (1985-1997). Tests whether the empirical-research harness
  (CLAUDE.md rules, hooks, skill) changes rigor/completeness vs. a bare
  Claude Code session, holding the task prompt fixed to econbench's Wallace
  benchmark prompt.

# One-time data provisioning. The runner provisions this once before all
# trials, then symlinks the staged data into each trial workspace.
data_provision:
  econbench_benchmark: /Users/simonfirestone/econbench_framework/benchmarks/wallace/benchmark.yaml
  workspace_link: data

prompt: |
  You are a data-analysis agent. Your task is to implement a replication-style
  empirical analysis based on a methods-only specification. You must not use or
  search for the paper's empirical results, coefficient estimates, standard
  errors, p-values, conclusions, or interpretation of findings.

  ## Research objective

  Evaluate whether homeowner renovation/addition behavior can be modeled as an
  investment-timing decision under uncertainty, using a real-options framework
  and American Housing Survey microdata.

  ## Conceptual framework

  Treat a major home renovation, addition, or replacement as a partially
  irreversible investment. The homeowner has the option to invest now or wait.
  Waiting has value when future housing values, household conditions, or local
  market conditions are uncertain. Therefore, a homeowner may delay renovation
  even when expected net present value is positive because exercising the
  renovation option destroys the value of waiting.

  A standard net-present-value model predicts investment when expected
  benefits exceed costs. A real-options model adds an investment threshold:
  because renovation is costly and at least partly irreversible, the expected
  payoff must exceed cost by enough to compensate the owner for giving up the
  option to wait. Higher uncertainty should raise the investment threshold and
  reduce the probability of immediate renovation, all else equal.

  ## Data

  Use the national American Housing Survey biennial waves: 1985, 1987, 1989,
  1991, 1993, 1995, and 1997.

  The raw data has already been downloaded and staged locally under `data/` in
  this workspace, one subdirectory per wave:

  ```
  data/ahs_1985_national/
  data/ahs_1987_national/
  data/ahs_1989_national/
  data/ahs_1991_national/
  data/ahs_1993_national/
  data/ahs_1995_national/
  data/ahs_1997_national/
  ```

  Do not download, search for, or re-acquire AHS data. Read the data directly
  from these directories.

  ## Unit of observation

  Housing-unit-by-survey-wave observation, linked longitudinally where
  possible using the AHS housing-unit identifier.

  ## Sample

  Restrict to owner-occupied units, single-family detached homes, regular
  completed interviews, and observations with nonmissing variables needed for
  the analysis.

  ## Operationalization

  Use AHS panel observations to identify whether a homeowner undertook a major
  addition, replacement, or renovation between survey waves. Model this
  decision as the observed exercise of a housing-investment option.

  Construct or harmonize:
  - Renovation/addition indicator
  - House value
  - Property taxes
  - Household income
  - Year built / age of structure
  - Metropolitan/geographic identifier
  - Recent mover indicator
  - Listed-for-sale indicator
  - Routine maintenance or improvement expenditure variables, if available
  - Uncertainty proxy
  - Option-value proxy

  ## Recommended econometric structure

  Estimate discrete-choice models where the dependent variable is the
  renovation/addition indicator. Suitable models include logit, probit, or
  linear probability models used as robustness checks. Include controls for
  household resources, property characteristics, geography, time/wave effects,
  and housing-market conditions where feasible.

  Minimum model progression:
  1. Baseline model with household and property controls.
  2. Add geography and wave controls.
  3. Add uncertainty proxy.
  4. Add option-value proxy or uncertainty/incentive interactions.
  5. Robustness check using an alternative model form or alternative
     uncertainty proxy.

  ## Required deliverables (save all to `outputs/`)

  - `replication_plan.md`
  - `variable_crosswalk.csv`
  - `sample_construction_log.csv`
  - `analysis_code.py`
  - `regression_tables.csv`
  - `replication_memo.md`
  - `limitations.md`
  - `descriptive_statistics.csv` — summary statistics (mean, median, std, min,
    max, count) for all key analysis variables, overall and by wave.
  - `predictions.csv` — for your preferred model, save one row per observation
    with columns: `wave`, `actual` (0/1 renovation indicator), `predicted`
    (predicted probability from the model). This is used to evaluate model fit.

  ## Restrictions

  Do not use the original paper's coefficient estimates, standard errors,
  p-values, tables, or conclusions. Do not search for summaries of the paper's
  results. Use the methods-only specification to construct and evaluate the
  empirical analysis independently.

# Shorter, naturalistic prompt without pre-instructed best practices.
# Selected by a future `--prompt-variant naturalistic` flag.
prompt_naturalistic: |
  Using the AHS data in `data/`, test whether homeowner renovation behavior
  can be modeled as a real-options investment-timing decision. Save all
  deliverables to `outputs/`.

# ── Scoring rubric ───────────────────────────────────────────────────────────
# Mirrors benchmarks/wallace/benchmark.yaml in econbench_framework, translated
# into this harness's auto/judge criteria schema.

criteria:
  # ── Required deliverables ───────────────────────────────────────────────
  - id: A1
    category: Deliverables
    description: All 7 required files present in outputs/
    mode: auto
    check: file_exists
    path: replication_plan.md
    min_words: 20

  - id: A2
    category: Deliverables
    description: variable_crosswalk.csv present and non-trivial
    mode: auto
    check: file_exists
    path: variable_crosswalk.csv
    min_words: 10

  - id: A3
    category: Deliverables
    description: regression_tables.csv present and non-trivial
    mode: auto
    check: file_exists
    path: regression_tables.csv
    min_words: 10

  # ── Sample construction ─────────────────────────────────────────────────
  - id: B1
    category: Sample Construction
    description: Sample restrictions applied (owner-occ, single-family, complete interview)
    mode: judge
    judge_prompt: >
      Does the sample construction restrict to owner-occupied units,
      single-family detached homes, and regular completed interviews (or
      clearly documented equivalents), with a row-count log across all 7
      waves (1985,1987,1989,1991,1993,1995,1997)? Score on a 0/1/2 scale:
      0 = restrictions ignored/absent; 1 = restrictions mentioned but
      incomplete or incorrect (missing one of the three restrictions, or
      missing waves in the log); 2 = all three restrictions correctly
      applied with a complete row-count log across all 7 waves.

  - id: B2
    category: Sample Construction
    description: Renovation indicator correctly harmonized across wave-specific codes
    mode: judge
    judge_prompt: >
      Does the analysis correctly identify that different AHS waves use
      different source variables/codes for the renovation indicator (e.g.
      NEWADD in earlier waves vs RAN in 1997), and explicitly document the
      harmonization? Score on a 0/1/2 scale: 0 = coding differences ignored
      (all waves treated identically with no acknowledgment); 1 = coding
      differences mentioned but harmonization incomplete or incorrect;
      2 = coding differences correctly identified and harmonization
      explicitly documented.

  # ── Variable construction ───────────────────────────────────────────────
  - id: C1
    category: Variable Construction
    description: Uncertainty proxy is theoretically justified and reflects housing-market volatility
    mode: judge
    judge_prompt: >
      Is there a real, computed uncertainty proxy tied to house-price
      volatility/dispersion (e.g., metro-by-wave dispersion of log house
      values, or an externally merged price index), not a placeholder or
      unrelated variable? FAIL if the "uncertainty" variable is not
      economically connected to price/market volatility.

  - id: C2
    category: Variable Construction
    description: Option-value proxy interacts uncertainty with a value/incentive measure
    mode: judge
    judge_prompt: >
      Is there an option-value proxy constructed from the uncertainty
      measure (e.g., uncertainty x house value, or uncertainty x income),
      with a stated theoretical rationale connecting it to the real-options
      framework? A proxy with no interaction/theoretical link = FAIL.

  - id: C3
    category: Variable Construction
    description: Missing/hard-to-construct variables (recent_mover, listed_for_sale, maintenance) are handled honestly
    mode: judge
    judge_prompt: >
      For variables not directly available in the AHS PUF (recent mover,
      listed for sale, maintenance expenditure), does the submission
      explicitly document them as missing/approximated in limitations
      rather than fabricating values or silently omitting mention of them?
      Score on a 0/1/2 scale: 0 = missing variables silently omitted or
      fabricated without disclosure; 1 = mentioned but documentation
      incomplete or partially inaccurate; 2 = missing/approximated
      variables honestly and explicitly documented.

  # ── Econometrics ────────────────────────────────────────────────────────
  - id: D1
    category: Econometrics
    description: Model progression follows the 5-step structure (baseline -> geo/wave -> uncertainty -> option value -> robustness)
    mode: judge
    judge_prompt: >
      Does regression_tables.csv / analysis code show a progression of at
      least: (1) baseline household+property controls, (2) + geography/wave
      controls, (3) + uncertainty proxy, (4) + option-value proxy, (5) a
      robustness check with an alternative specification? Missing 2 or more
      of these steps = FAIL.

  - id: D2
    category: Econometrics
    description: Higher uncertainty predicted to reduce renovation probability, and result interpreted against real-options theory
    mode: judge
    judge_prompt: >
      Does the replication memo interpret the sign/magnitude of the
      uncertainty and option-value coefficients explicitly in terms of the
      real-options prediction (higher uncertainty -> higher threshold ->
      lower renovation probability), rather than just reporting numbers
      with no theoretical interpretation? Score on a 0/1/2 scale: 0 = no
      theoretical interpretation at all; 1 = interpretation attempted but
      incomplete or incorrect; 2 = signs/magnitudes correctly and
      substantively interpreted against the real-options prediction.

  # ── Reproducibility / integrity ─────────────────────────────────────────
  - id: E1
    category: Reproducibility
    description: No fabricated numbers — regression stats trace to executed code
    mode: judge
    judge_prompt: >
      Do the coefficients/statistics reported in regression_tables.csv and
      replication_memo.md appear to trace to code that was actually executed
      in this session (not invented or copied from memory of the original
      paper)? FAIL if there's evidence of fabrication or unexecuted code.

  - id: E2
    category: Reproducibility
    description: Did not reference/use the original paper's actual results
    mode: judge
    judge_prompt: >
      Does the submission avoid citing or reproducing the original Wallace
      paper's actual coefficient estimates, standard errors, p-values, or
      conclusions (per the restriction in the prompt)? Citing specific
      numbers attributable to the original paper = FAIL.

  - id: E3
    category: Reproducibility
    description: limitations.md substantively discusses approximations/ambiguity
    mode: auto
    check: file_exists
    path: limitations.md
    min_words: 30

discriminators: [B1, B2, C1, C2, C3, D1, D2, E1]

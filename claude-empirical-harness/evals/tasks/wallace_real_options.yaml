name: wallace_real_options
description: >
  Real-options replication of homeowner renovation timing using AHS national
  PUF waves (1985-1997). Tests whether the empirical-research harness
  (CLAUDE.md rules, hooks, skill) changes rigor/completeness vs. a bare
  Claude Code session, holding the task prompt fixed to econbench's Wallace
  benchmark prompt.

# One-time data provisioning. The runner provisions this once before all
# trials, then symlinks the staged data into each trial workspace.
data_provision:
  econbench_benchmark: /Users/simonfirestone/empirical_agent/econbench_framework/benchmarks/wallace/benchmark.yaml
  workspace_link: data

prompt: |
  You are a data-analysis agent. Your task is to implement a replication-style
  empirical analysis based on a methods-only specification. You must not use or
  search for the paper's empirical results, coefficient estimates, standard
  errors, p-values, conclusions, or interpretation of findings.

  ## Research objective

  Evaluate whether homeowner renovation/addition behavior can be modeled as an
  investment-timing decision under uncertainty, using a real-options framework
  and American Housing Survey microdata.

  ## Conceptual framework

  Treat a major home renovation, addition, or replacement as a partially
  irreversible investment. The homeowner has the option to invest now or wait.
  Waiting has value when future housing values, household conditions, or local
  market conditions are uncertain. Therefore, a homeowner may delay renovation
  even when expected net present value is positive because exercising the
  renovation option destroys the value of waiting.

  A standard net-present-value model predicts investment when expected
  benefits exceed costs. A real-options model adds an investment threshold:
  because renovation is costly and at least partly irreversible, the expected
  payoff must exceed cost by enough to compensate the owner for giving up the
  option to wait. Higher uncertainty should raise the investment threshold and
  reduce the probability of immediate renovation, all else equal.

  ## Data

  Use the national American Housing Survey biennial waves: 1985, 1987, 1989,
  1991, 1993, 1995, and 1997.

  The raw data has already been downloaded and staged locally under `data/` in
  this workspace, one subdirectory per wave:

  ```
  data/ahs_1985_national/
  data/ahs_1987_national/
  data/ahs_1989_national/
  data/ahs_1991_national/
  data/ahs_1993_national/
  data/ahs_1995_national/
  data/ahs_1997_national/
  ```

  Do not download, search for, or re-acquire AHS data. Read the data directly
  from these directories.

  ## Unit of observation

  Housing-unit-by-survey-wave observation, linked longitudinally where
  possible using the AHS housing-unit identifier.

  ## Sample

  Restrict to owner-occupied units, single-family detached homes, regular
  completed interviews, and observations with nonmissing variables needed for
  the analysis.

  ## Operationalization

  Use AHS panel observations to identify whether a homeowner undertook a major
  addition, replacement, or renovation between survey waves. Model this
  decision as the observed exercise of a housing-investment option.

  Construct or harmonize:
  - Renovation/addition indicator
  - House value
  - Property taxes
  - Household income
  - Year built / age of structure
  - Metropolitan/geographic identifier
  - Recent mover indicator
  - Listed-for-sale indicator
  - Routine maintenance or improvement expenditure variables, if available
  - Uncertainty proxy
  - Option-value proxy

  ## Variable definitions (from the original methods specification)

  Construct the following variables per the original study's definitions.
  External time-series inputs (90-day T-bill rates, FHFA/agency repeat-sales
  house price indices, and a PPI residential construction cost index) are
  staged in `data/external/` — use them; do not download alternatives.

  - Dependent variable (Y): binary indicator equal to 1 if the household
    undertook one or more major additions/renovations (new bedrooms,
    bathrooms, kitchens, or other big-ticket, partially irreversible
    projects) during the two years between survey waves, 0 otherwise.
    Source variables differ by wave (e.g. NEWADD in 1985-1993; RAS/RAW-type
    addition arrays with valid cost codes in 1995 and 1997); harmonize and
    document the mapping.
  - SPREAD: house return minus the user cost of capital, averaged over the
    survey year and the prior year: SPREAD_{n,t} = (s_{n,t} + s_{n,t-1})/2,
    where s_{n,t} = pi_{n,t} - rho_{n,t}.
    - House return pi_{n,t}: annualized percent change in house value
      (change in house value / lagged house value), using reported AHS
      house values, interpolated for non-survey years with the MSA-level
      repeat-sales house price index from `data/external/`.
    - User cost rho_{n,t} = UPKEEP + (1 - (federal + state marginal tax
      rate)) * (PTAX + r_t), where r_t is the annualized 90-day T-bill rate
      from `data/external/`; UPKEEP = annual routine maintenance spending /
      house value; PTAX = annual property taxes / house value. Marginal tax
      rates are approximated from household income and filing status; if
      tax schedules are unavailable, use a documented approximation.
      Conceptually: after-tax cost of funds plus property tax and
      depreciation/upkeep, net of expected capital gain.
  - SPREAD VOL: volatility of SPREAD. Original definition: average absolute
    deviation of the house's spread from its long-run (all-wave) average
    spread, VOL_{n,t} = (|s_{n,t} - s_bar_n| + |s_{n,t-1} - s_bar_n|)/2. A
    rolling standard deviation of SPREAD across time within MSA (or across
    houses within MSA) is an acceptable documented alternative.
  - COST: construction cost per square foot of additions. The original
    study used proprietary state-level cost-per-square-foot indices; here,
    proxy with the PPI residential construction cost index in
    `data/external/`, documented as an approximation.
  - COST VOL: volatility of COST, defined analogously to SPREAD VOL (e.g.
    average absolute deviation from the long-run mean, or a rolling
    standard deviation of construction-cost changes).
  - RECMOVER: dummy equal to 1 if the household moved into the unit
    recently (respondent moved in within the last 12 months per the
    wave-specific mover variables; a within-last-2-years definition is
    acceptable if documented). Wave-specific sources (e.g. RMR in 1985-95;
    move-year/month variables in 1997) should be harmonized.
  - PER: number of persons in the household.
  - INC / INCOME: household income in thousands of dollars.
  - AGE: age of the structure in years = survey year minus year built.
  - Sample-selection variables: units-in-structure (single family
    detached), interview status (occupied regular interview), and tenure
    (owner-occupied); plus MSA/geographic identifier for merging external
    indices.

  ## Recommended econometric structure

  Estimate discrete-choice models where the dependent variable is the
  renovation/addition indicator. Suitable models include logit, probit, or
  linear probability models used as robustness checks. Include controls for
  household resources, property characteristics, geography, time/wave effects,
  and housing-market conditions where feasible.

  Minimum model progression:
  1. Baseline model with household and property controls.
  2. Add geography and wave controls.
  3. Add uncertainty proxy.
  4. Add option-value proxy or uncertainty/incentive interactions.
  5. Robustness check using an alternative model form or alternative
     uncertainty proxy.

  ## Required deliverables (save all to `outputs/`)

  - `replication_plan.md`
  - `variable_crosswalk.csv`
  - `sample_construction_log.csv`
  - `analysis_code.py`
  - `regression_tables.csv`
  - `replication_memo.md`
  - `limitations.md`
  - `descriptive_statistics.csv` — summary statistics (mean, median, std, min,
    max, count) for all key analysis variables, overall and by wave.
  - `predictions.csv` — for your preferred model, save one row per observation
    with columns: `wave`, `actual` (0/1 renovation indicator), `predicted`
    (predicted probability from the model). This is used to evaluate model fit.

  ## Restrictions

  Do not use the original paper's coefficient estimates, standard errors,
  p-values, tables, or conclusions. Do not search for summaries of the paper's
  results. Use the methods-only specification to construct and evaluate the
  empirical analysis independently.

# Shorter, naturalistic prompt without pre-instructed best practices.
# Selected by a future `--prompt-variant naturalistic` flag.
prompt_naturalistic: |
  Using the AHS data in `data/`, test whether homeowner renovation behavior
  can be modeled as a real-options investment-timing decision. Save all
  deliverables to `outputs/`.

# Scoring rubric lives in wallace_real_options_rubric.yaml (separate file
# to prevent leakage to the agent under evaluation).
rubric: wallace_real_options_rubric.yaml
